<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

/* --- Ad containers --- */
#ad-banner {
	position: fixed;
	bottom: 0;
	left: 0;
	right: 0;
	text-align: center;
	z-index: 100;
	display: none;
	background: rgba(0,0,0,0.8);
	padding: 4px 0;
}

#ad-interstitial-overlay {
	position: fixed;
	top: 0; left: 0; right: 0; bottom: 0;
	z-index: 200;
	background: rgba(0,0,0,0.85);
	display: none;
	justify-content: center;
	align-items: center;
	flex-direction: column;
}

#ad-interstitial-overlay .ad-close {
	color: white;
	font-size: 14px;
	margin-top: 12px;
	cursor: pointer;
	font-family: sans-serif;
	display: none;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<!-- Banner ad container -->
		<div id="ad-banner">
			<ins class="adsbygoogle"
				style="display:inline-block;width:728px;height:90px"
				data-ad-client="$ADSENSE_CLIENT_ID"
				data-ad-slot="$ADSENSE_BANNER_SLOT"></ins>
		</div>

		<!-- Interstitial / rewarded overlay -->
		<div id="ad-interstitial-overlay">
			<ins class="adsbygoogle"
				style="display:inline-block;width:300px;height:250px"
				data-ad-client="$ADSENSE_CLIENT_ID"
				data-ad-slot="$ADSENSE_INTERSTITIAL_SLOT"></ins>
			<span class="ad-close" onclick="closeInterstitial()">Close &times;</span>
		</div>

		<!-- AdSense library (replace data-ad-client with your publisher ID) -->
		<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=$ADSENSE_CLIENT_ID" crossorigin="anonymous"></script>

		<script>
		// ============================================================
		// Ad bridge — called by Godot's AdManager via JavaScriptBridge
		// ============================================================

		// Replace these with your real AdSense publisher and slot IDs:
		// const ADSENSE_CLIENT = "ca-pub-XXXXXXXXXXXXXXXX";
		// Banner slot, interstitial slot, rewarded slot are set in the
		// HTML ins tags above. Update data-ad-client and data-ad-slot.

		var _adCallbacks = {};
		var _interstitialTimer = null;

		// --- Banner ---
		window.showBannerAd = function() {
			var el = document.getElementById('ad-banner');
			el.style.display = 'block';
			try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
		};

		window.hideBannerAd = function() {
			document.getElementById('ad-banner').style.display = 'none';
		};

		// --- Interstitial ---
		window.showInterstitialAd = function(callbackId) {
			var overlay = document.getElementById('ad-interstitial-overlay');
			overlay.style.display = 'flex';
			try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
			// Show close button after 5 seconds
			var closeBtn = overlay.querySelector('.ad-close');
			closeBtn.style.display = 'none';
			_interstitialTimer = setTimeout(function() {
				closeBtn.style.display = 'block';
			}, 5000);
			_adCallbacks['interstitial'] = callbackId;
		};

		window.closeInterstitial = function() {
			var overlay = document.getElementById('ad-interstitial-overlay');
			overlay.style.display = 'none';
			if (_interstitialTimer) clearTimeout(_interstitialTimer);
			var cid = _adCallbacks['interstitial'];
			if (cid && window.godotAdCallback) {
				window.godotAdCallback(cid, true);
			}
			_adCallbacks['interstitial'] = null;
		};

		// --- Rewarded ---
		window.showRewardedAd = function(callbackId) {
			// For rewarded ads on web, we show a longer interstitial-style
			// display ad and grant the reward after a mandatory watch period.
			var overlay = document.getElementById('ad-interstitial-overlay');
			overlay.style.display = 'flex';
			try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
			var closeBtn = overlay.querySelector('.ad-close');
			closeBtn.style.display = 'none';
			_adCallbacks['rewarded'] = callbackId;
			// Reward granted after 15 seconds
			_interstitialTimer = setTimeout(function() {
				overlay.style.display = 'none';
				if (window.godotAdCallback) {
					window.godotAdCallback(callbackId, true);
				}
				_adCallbacks['rewarded'] = null;
			}, 15000);
		};

		// --- Godot callback bridge ---
		window.godotAdCallback = function(id, success) {
			// The Godot side handles this via timer fallback.
			// This exists so future proper JS→Godot callback
			// integration can replace the timer approach.
			console.log('Ad callback:', id, success);
		};
		</script>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
